services:
  nira-api:
    build: .
    container_name: nira-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./audit_logs:/app/audit_logs
      - ./tmp_audio:/app/tmp_audio
      - ./nira.db:/app/nira.db
      - ./credentials:/app/credentials:ro
    restart: unless-stopped

  nira-dashboard:
    build: .
    container_name: nira-dashboard
    command: streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - NIRA_API_BASE_URL=http://nira-api:8000
    volumes:
      - ./app:/app/app
      - ./dashboard:/app/dashboard
      - ./data:/app/data
      - ./audit_logs:/app/audit_logs
      - ./tmp_audio:/app/tmp_audio
      - ./nira.db:/app/nira.db
      - ./credentials:/app/credentials:ro
    depends_on:
      - nira-api
    restart: unless-stopped